<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(256, 236) scale(3.2) translate(-77, -50) translate(25, 10) skewX(-15)">
    <!-- 1. Parça (0s - 0.375s parlar) -->
    <path d="M 0,15 L 35,15 L 55,40 L 35,65 L 0,65 L 20,40 Z" fill="url(#grad1)" opacity="0.2">
      <animate attributeName="opacity" values="1;0.2;0.2;1;1" keyTimes="0;0.25;0.75;0.9;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- 2. Parça (0.375s - 0.75s parlar) -->
    <path d="M 25,15 L 60,15 L 80,40 L 60,65 L 25,65 L 45,40 Z" fill="url(#grad2)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2;1;0.2" keyTimes="0;0.25;0.5;0.9;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- 3. Parça (0.75s - 1.125s parlar) -->
    <path d="M 50,15 L 85,15 L 105,40 L 85,65 L 50,65 L 70,40 Z" fill="#60A5FA" filter="url(#glow)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.2;1;1;0.2" keyTimes="0;0.5;0.75;0.9;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
