  <!-- QR Scanning Engine (The Force) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    window.startWebScanner = function(videoId, onDetect) {
      console.log("Starting Native Web Scanner for ID:", videoId);
      const video = document.getElementById(videoId);
      if (!video) {
        console.error("Video element not found yet, retrying...");
        setTimeout(() => window.startWebScanner(videoId, onDetect), 500);
        return;
      }
      
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        } 
      })
      .then(stream => {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        
        function scan() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: "dontInvert",
            });
            if (code) {
              console.log("QR Detected:", code.data);
              onDetect(code.data);
              // We keep scanning or Flutter can handle closing
            }
          }
          requestAnimationFrame(scan);
        }
        requestAnimationFrame(scan);
      })
      .catch(err => {
        console.error("Native Scanner Media Error:", err);
        alert("Kamera başlatılamadı: " + err.message);
      });
    };
  </script>

  <!-- ═══════════════════════════════════════════════════════════════════════
       📱 MOBİL KLAVYE VIEWPORT FIX
       Klavye kapandığında kalan boşluğu otomatik temizler.
       iOS Safari + Android Chrome için evrensel çözüm.
       ═══════════════════════════════════════════════════════════════════════ -->
  <script>
    (function() {
      // Gerçek görünür alan yüksekliğini CSS değişkenine yaz
      function setViewportHeight() {
        const vh = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;
        document.documentElement.style.setProperty('--real-vh', vh + 'px');
      }

      // Flutter'ın ana konteynerini görünür alana sığdır
      function fixFlutterViewport() {
        const vvHeight = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;
        const vvWidth = window.visualViewport
          ? window.visualViewport.width
          : window.innerWidth;

        // body ve html'i visual viewport'a kilitle
        document.documentElement.style.height = vvHeight + 'px';
        document.body.style.height = vvHeight + 'px';
        document.body.style.width = vvWidth + 'px';

        // Flutter'ın glass-pane elementini de düzelt
        const flutterView = document.querySelector('flt-glass-pane');
        if (flutterView) {
          flutterView.style.height = vvHeight + 'px';
          flutterView.style.width = vvWidth + 'px';
        }

        // Flutter'ın view container'ını da düzelt
        const flutterViewport = document.querySelector('flutter-view');
        if (flutterViewport) {
          flutterViewport.style.height = vvHeight + 'px';
        }
      }

      // visualViewport API var mı? (Modern iOS 13+ ve Android destekler)
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
          fixFlutterViewport();
          setViewportHeight();
        });
        window.visualViewport.addEventListener('scroll', function() {
          fixFlutterViewport();
        });
        // Başlangıç değerini ayarla
        setViewportHeight();
      }

      // Eski yöntem: window resize (Android Chrome fallback)
      window.addEventListener('resize', function() {
        setViewportHeight();
        // Küçük bir gecikme ile çalıştır (klavye animasyonu bitmesini bekle)
        setTimeout(fixFlutterViewport, 100);
        setTimeout(fixFlutterViewport, 300); // iOS Safari için ekstra deneme
      });

      // Sayfa yüklendiğinde ve orientation değiştiğinde de çalıştır
      window.addEventListener('orientationchange', function() {
        setTimeout(fixFlutterViewport, 300);
        setTimeout(fixFlutterViewport, 600);
      });

      // Flutter render tamamlandıktan sonra başlangıç değerini uygula
      window.addEventListener('load', function() {
        setTimeout(fixFlutterViewport, 500);
        setTimeout(fixFlutterViewport, 1500);
      });
    })();
  </script>

  <!-- Firebase Messaging Service Worker Kayıtı (Web Push için) -->
  <script>
    if ('serviceWorker' in navigator) {
      let swRefreshing = false; // Sonsuz döngü koruması

      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then(function(registration) {
          console.log('✅ FCM Service Worker kaydedildi:', registration.scope);

          // ✨ Yeni bir SW update var mı kontrol et
          registration.addEventListener('updatefound', function() {
            const newWorker = registration.installing;
            if (!newWorker) return;

            newWorker.addEventListener('statechange', function() {
              // Yeni SW "aktive oldu" ve eski bir controller vardı (ilk yükleme değil)
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                if (!swRefreshing) {
                  swRefreshing = true;
                  console.log('🔄 Yeni uygulama sürümü bulundu, sayfa yenileniyor...');
                  window.location.reload();
                }
              }
            });
          });

          // Controller değiştiğinde de sayfayı yenile (skipWaiting aktive olunca)
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!swRefreshing) {
              swRefreshing = true;
              console.log('🔄 Service Worker güncellendi, sayfa yenileniyor...');
              window.location.reload();
            }
          });
        })
        .catch(function(err) {
          console.log('❌ FCM Service Worker kayıt hatası:', err);
        });
      
      // Service Worker'dan gelen mesajları dinle (bildirim tıklama yönlendirmesi)
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data?.type === 'NOTIFICATION_CLICK' && event.data?.route) {
          window.location.hash = event.data.route;
        }
      });
    }
  </script>
